name: Keep Supabase Alive

on:
  schedule:
    # 매주 월/수/금 자정 (UTC 기준) - 일주일에 3번 실행
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # 수동으로도 실행할 수 있도록 옵션 추가

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        # Supabase 프로젝트의 REST API (public.rankings 테이블) 에 GET 요청을 보내서 데이터베이스를 활성 상태로 유지
        # 파라미터로 limit=1 을 주어 부하를 최소화
        run: |
          curl -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Ymdqdm1ia3BtZnZ2a2xod3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1Nzc5MjEsImV4cCI6MjA4NzE1MzkyMX0.LBW3UT8vpCDn7FXUzczijZ4wbNYWPFtorluEO1EUtXw" \
               -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6Ymdqdm1ia3BtZnZ2a2xod3RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1Nzc5MjEsImV4cCI6MjA4NzE1MzkyMX0.LBW3UT8vpCDn7FXUzczijZ4wbNYWPFtorluEO1EUtXw" \
               -s -o /dev/null -w "%{http_code}" \
               "https://vzbgjvmbkpmfvvklhwti.supabase.co/rest/v1/rankings?select=*&limit=1"
